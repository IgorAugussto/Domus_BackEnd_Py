name: Python Extrato CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        cd domus_python
        docker build -f Dockerfile.python -t ${{ secrets.DOCKER_USERNAME }}/domus-extrato:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/domus-extrato:latest

    - name: Deploy na EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop domus-extrato || true
          docker rm domus-extrato || true
          docker rmi ${{ secrets.DOCKER_USERNAME }}/domus-extrato:latest || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/domus-extrato:latest
          docker run -d \
            --restart always \
            -p 5000:5000 \
            --name domus-extrato \
            ${{ secrets.DOCKER_USERNAME }}/domus-extrato:latest
          docker ps
